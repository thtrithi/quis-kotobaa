<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言葉道 — Latihan Kotoba JLPT N5 & N4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kurenaido&display=swap" rel="stylesheet">
<style>
  :root{
    --washi:#F3ECDD;
    --washi-deep:#EAE0CB;
    --ink:#2A2622;
    --ink-soft:#5C564C;
    --torii:#B23A2E;
    --torii-deep:#8E2C22;
    --indigo:#2C3A5E;
    --indigo-soft:#4A5A82;
    --gold:#B08947;
    --line:#D8CBA9;
    --card-bg:#FBF7EC;
    --good:#3E7A52;
    --bad:#B23A2E;
    --shadow: 0 1px 0 rgba(42,38,34,0.04), 0 8px 24px -8px rgba(42,38,34,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--washi);
    background-image:
      radial-gradient(circle at 18% 8%, rgba(178,58,46,0.05), transparent 38%),
      radial-gradient(circle at 85% 92%, rgba(44,58,94,0.05), transparent 42%);
    color:var(--ink);
    font-family:'Noto Sans JP', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:760px;
    margin:0 auto;
    padding:28px 18px 60px;
    min-height:100vh;
  }
  /* Header */
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:30px;
    padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .brand-mark{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:26px;
    color:var(--torii-deep);
    letter-spacing:0.02em;
  }
  .brand-mark .sub{
    display:block;
    font-family:'Noto Sans JP', sans-serif;
    font-size:11px;
    font-weight:500;
    color:var(--ink-soft);
    letter-spacing:0.12em;
    margin-top:2px;
  }
  .brand-tag{
    font-size:11px;
    color:var(--ink-soft);
    font-weight:500;
    letter-spacing:0.04em;
    text-align:right;
    max-width:140px;
  }

  /* Generic card */
  .panel{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:var(--shadow);
    padding:24px;
    margin-bottom:18px;
    position:relative;
  }
  .panel::before{
    content:'';
    position:absolute;
    top:0; left:0;
    width:3px; height:100%;
    background:var(--torii);
    border-radius:4px 0 0 4px;
  }
  .panel.indigo::before{ background:var(--indigo); }

  h2.section-title{
    font-family:'Shippori Mincho', serif;
    font-size:19px;
    font-weight:700;
    color:var(--ink);
    margin:0 0 4px;
  }
  .section-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0 0 20px;
  }

  /* Choice grid for level/mode select */
  .choice-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .choice-card{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:6px;
    padding:18px 14px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, transform .1s, box-shadow .15s;
    user-select:none;
  }
  .choice-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px -6px rgba(42,38,34,0.18); }
  .choice-card.selected{
    border-color:var(--torii);
    background:#FBF1EC;
  }
  .choice-card .kanji-big{
    font-family:'Shippori Mincho', serif;
    font-size:30px;
    font-weight:800;
    color:var(--torii-deep);
    line-height:1;
  }
  .choice-card .label{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:6px;
    font-weight:500;
  }
  .choice-card.selected .kanji-big{ color:var(--torii); }

  /* direction toggle */
  .dir-toggle{
    display:flex;
    border:1.5px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    background:#fff;
  }
  .dir-opt{
    flex:1;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    transition:background .15s,color .15s;
    border-right:1px solid var(--line);
  }
  .dir-opt:last-child{ border-right:none; }
  .dir-opt.selected{
    background:var(--indigo);
    color:#fff;
  }
  .dir-opt .arrow{ font-size:11px; opacity:.7; display:block; margin-top:2px;}

  /* bab list */
  .bab-scroll{
    max-height:260px;
    overflow-y:auto;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    padding:6px;
  }
  .bab-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 12px;
    border-radius:4px;
    cursor:pointer;
    font-size:13.5px;
    margin-bottom:2px;
  }
  .bab-item:hover{ background:var(--washi); }
  .bab-item.selected{
    background:var(--torii);
    color:#fff;
  }
  .bab-item .count{
    font-size:11px;
    opacity:.7;
  }
  .bab-all{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:13px 14px;
    border:1.5px dashed var(--gold);
    border-radius:6px;
    cursor:pointer;
    margin-bottom:10px;
    background:#FFF9EC;
    font-size:13.5px;
    font-weight:500;
  }
  .bab-all.selected{
    background:var(--gold);
    color:#fff;
    border-style:solid;
  }

  /* slider */
  .slider-row{
    display:flex;
    align-items:center;
    gap:16px;
  }
  input[type=range]{
    flex:1;
    -webkit-appearance:none;
    height:6px;
    border-radius:3px;
    background:var(--line);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:22px; height:22px;
    border-radius:50%;
    background:var(--torii);
    border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    cursor:pointer;
  }
  .slider-val{
    font-family:'Shippori Mincho', serif;
    font-size:24px;
    font-weight:800;
    color:var(--torii-deep);
    min-width:46px;
    text-align:center;
  }
  .slider-row{ margin-bottom:10px; }
  .slider-marks{
    display:flex;
    justify-content:space-between;
    font-size:10.5px;
    color:var(--ink-soft);
    padding:0 2px;
  }
  .warn-note{
    font-size:11.5px;
    color:var(--torii-deep);
    margin-top:8px;
    background:#FBF1EC;
    border-radius:4px;
    padding:8px 10px;
  }

  /* primary button */
  .btn-primary{
    display:block;
    width:100%;
    background:var(--torii);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:16px;
    font-size:15px;
    font-weight:700;
    font-family:'Noto Sans JP', sans-serif;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:background .15s, transform .1s;
    margin-top:6px;
  }
  .btn-primary:hover{ background:var(--torii-deep); }
  .btn-primary:active{ transform:scale(0.99); }
  .btn-primary:disabled{ background:#C9BFA8; cursor:not-allowed; }
  .btn-secondary{
    display:block;
    width:100%;
    background:transparent;
    color:var(--indigo);
    border:1.5px solid var(--indigo);
    border-radius:6px;
    padding:14px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
  }
  .btn-secondary:hover{ background:#EEF0F6; }

  /* Quiz screen */
  .quiz-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--line);
    border-radius:3px;
    margin:0 14px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--indigo);
    transition:width .25s ease;
  }
  .quiz-counter{
    font-size:12.5px;
    font-weight:600;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .quiz-exit{
    font-size:12px;
    color:var(--ink-soft);
    cursor:pointer;
    text-decoration:underline;
    white-space:nowrap;
  }

  .question-card{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:38px 24px;
    text-align:center;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .question-card .bab-tag{
    position:absolute;
    top:14px; left:18px;
    font-size:10.5px;
    color:var(--ink-soft);
    background:var(--washi);
    border-radius:10px;
    padding:3px 10px;
    font-weight:600;
  }
  .question-eyebrow{
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--torii);
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .question-word{
    font-family:'Shippori Mincho', serif;
    font-size:42px;
    font-weight:800;
    color:var(--ink);
    line-height:1.25;
    word-break:break-word;
  }
  .question-reading{
    font-size:15px;
    color:var(--ink-soft);
    margin-top:8px;
    font-weight:500;
  }

  .options-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .opt-btn{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    text-align:left;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .12s, background .12s;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .opt-btn .opt-letter{
    width:26px; height:26px;
    border-radius:50%;
    border:1.5px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .opt-btn:hover:not(:disabled){ border-color:var(--indigo-soft); }
  .opt-btn:disabled{ cursor:default; }
  .opt-btn.correct{
    border-color:var(--good);
    background:#EFF7F0;
  }
  .opt-btn.correct .opt-letter{ background:var(--good); border-color:var(--good); color:#fff; }
  .opt-btn.wrong{
    border-color:var(--bad);
    background:#FBEDEB;
  }
  .opt-btn.wrong .opt-letter{ background:var(--bad); border-color:var(--bad); color:#fff; }
  .opt-btn.dim{ opacity:.55; }

  .feedback-banner{
    margin-top:16px;
    padding:13px 16px;
    border-radius:6px;
    font-size:13.5px;
    font-weight:600;
    text-align:center;
  }
  .feedback-banner.good{ background:#EFF7F0; color:var(--good); }
  .feedback-banner.bad{ background:#FBEDEB; color:var(--bad); }

  /* result screen */
  .result-hero{
    text-align:center;
    padding:36px 20px;
  }
  .result-score{
    font-family:'Shippori Mincho', serif;
    font-size:64px;
    font-weight:800;
    color:var(--torii-deep);
    line-height:1;
  }
  .result-score .of{
    font-size:24px;
    color:var(--ink-soft);
    font-weight:500;
  }
  .result-label{
    font-size:14px;
    color:var(--ink-soft);
    margin-top:8px;
    font-weight:500;
  }
  .result-bar-wrap{
    height:10px;
    background:var(--line);
    border-radius:5px;
    overflow:hidden;
    margin:20px 0 6px;
  }
  .result-bar{
    height:100%;
    transition:width .6s ease;
  }
  .review-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:13px 0;
    border-bottom:1px solid var(--line);
    gap:12px;
  }
  .review-item:last-child{ border-bottom:none; }
  .review-q{
    font-size:14px;
    font-weight:600;
    color:var(--ink);
  }
  .review-meta{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:3px;
  }
  .review-status{
    font-size:11px;
    font-weight:700;
    padding:3px 9px;
    border-radius:10px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .review-status.good{ background:#EFF7F0; color:var(--good); }
  .review-status.bad{ background:#FBEDEB; color:var(--bad); }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:30px;
    opacity:.7;
  }

  @media (max-width:420px){
    .question-word{ font-size:34px; }
    .result-score{ font-size:50px; }
    .choice-card .kanji-big{ font-size:24px; }
  }
</style>
</head>

function buildWordPool(level, babKeys){
  const data = level === 'N5' ? N5_DATA : N4_DATA;
  let pool = [];
  babKeys.forEach(k=>{
    (data[k]||[]).forEach(w=>{
      pool.push({ jp:w[0], romaji:w[1], id:w[2], bab:k });
    });
  });
  return pool;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildQuiz(pool, count, direction){
  // direction: 'jp2id' soal bahasa jepang -> jawaban indo
  //            'id2jp' soal bahasa indo -> jawaban jepang
  const shuffledPool = shuffle(pool);
  const chosen = shuffledPool.slice(0, Math.min(count, shuffledPool.length));
  const questions = chosen.map(word=>{
    // build 3 distractors from pool (excluding this word's id/jp duplicate text)
    const others = pool.filter(w=> direction==='jp2id' ? w.id !== word.id : w.jp !== word.jp);
    const distractorsRaw = shuffle(others).slice(0,3);
    const correctText = direction==='jp2id' ? word.id : word.jp;
    const optionTexts = distractorsRaw.map(w=> direction==='jp2id' ? w.id : w.jp);
    let options = shuffle([correctText, ...optionTexts]);
    // ensure 4 options even if pool small (pad with placeholders if needed)
    while(options.length < 2){ options.push('—'); }
    return {
      word, direction,
      options,
      correctText
    };
  });
  return questions;
}

  state = Object.assign({}, state, patch);

function maxAvailable(){
  if(!state.level) return 0;
  const data = state.level === 'N5' ? N5_DATA : N4_DATA;
  if(state.babMode === 'all'){
    return Object.keys(data).reduce((sum,k)=> sum + data[k].length, 0);
  } else if(state.selectedBab){
    return (data[state.selectedBab]||[]).length;
  }
  return 0;
}

function canStart(){

// ====================== RENDER: QUIZ ======================
function renderQuiz(){
  const total = state.quiz.length;
  const q = state.quiz[state.currentIndex];
  const titles = state.level === 'N4' ? BAB_TITLES_N4 : BAB_TITLES_N5;
  const promptText = q.direction === 'jp2id' ? q.word.jp : q.word.id;
  const showReading = q.direction === 'jp2id';

  return `
    <div class="quiz-top">
      <span class="quiz-exit" data-action="exit-quiz">Keluar</span>
      <div class="progress-track"><div class="progress-fill" style="width:${(state.currentIndex/total)*100}%"></div></div>
      <span class="quiz-counter">${state.currentIndex+1} / ${total}</span>
    </div>

    <div class="question-card">
      <span class="bab-tag">Bab ${q.word.bab} · ${titles[q.word.bab]||''}</span>
      <div class="question-eyebrow">${q.direction==='jp2id' ? 'Apa artinya?' : 'Bahasa Jepangnya?'}</div>
      <div class="question-word">${promptText}</div>
      ${showReading && q.word.romaji ? `<div class="question-reading">${q.word.romaji}</div>` : ''}
    </div>

    <div class="options-grid">
      ${q.options.map((opt,i)=>{
        const letter = ['A','B','C','D'][i];
        let cls='opt-btn';
        if(state.answered){
          if(opt === q.correctText) cls+=' correct';
          else if(opt === state.picked) cls+=' wrong';
          else cls+=' dim';
        }
        return `<button class="${cls}" data-action="pick-option" data-opt="${encodeURIComponent(opt)}" ${state.answered?'disabled':''}>
          <span class="opt-letter">${letter}</span><span>${opt}</span>
        </button>`;
      }).join('')}
    </div>

    ${state.answered ? `
      <div class="feedback-banner ${state.picked===q.correctText ? 'good':'bad'}">
        ${state.picked===q.correctText ? '✓ Benar! Lanjut ke soal berikutnya.' : `✗ Kurang tepat. Jawaban benar: ${q.correctText}`}
      </div>
      <button class="btn-primary" data-action="next-question" style="margin-top:14px;">
        ${state.currentIndex+1 < total ? 'Soal berikutnya' : 'Lihat hasil'}
      </button>
    ` : ''}
  `;
}

    <div class="panel indigo">
      <h2 class="section-title">Ulasan jawaban</h2>
      <p class="section-sub">${state.level} · ${state.direction==='jp2id' ? 'Jepang → Indonesia' : 'Indonesia → Jepang'}</p>
      ${state.answers.map(a=>{
        const q = a.q;
        const promptText = q.direction==='jp2id' ? q.word.jp : q.word.id;
        return `
          <div class="review-item">
            <div>
              <div class="review-q">${promptText}</div>
              <div class="review-meta">Bab ${q.word.bab} · jawaban: ${q.correctText}${q.direction==='jp2id' ? ` (${q.word.romaji})` : ''}</div>
            </div>
            <span class="review-status ${a.correct?'good':'bad'}">${a.correct?'Benar':'Salah'}</span>
          </div>
        `;
      }).join('')}
    </div>

    <button class="btn-primary" data-action="retry-same">Ulangi latihan ini</button>
    <button class="btn-secondary" data-action="back-setup">Ganti level / bab / mode</button>
  `;
}

// ====================== MAIN RENDER ======================
function render(){
  if(state.screen==='setup') root.innerHTML = renderSetup();
  else if(state.screen==='quiz') root.innerHTML = renderQuiz();
  else if(state.screen==='result') root.innerHTML = renderResult();
}

// ====================== EVENTS ======================
root.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action==='select-level'){
    setState({ level: el.dataset.level, babMode:'all', selectedBab:null, questionCount:20 });
  }
  else if(action==='select-bab-all'){
    setState({ babMode:'all', selectedBab:null });
  }
  else if(action==='select-bab'){
    setState({ babMode:'single', selectedBab:Number(el.dataset.bab) });
  }
  else if(action==='select-dir'){
    setState({ direction: el.dataset.dir });
  }
  else if(action==='start-quiz'){
    const data = state.level==='N5' ? N5_DATA : N4_DATA;
    const babKeys = state.babMode==='all' ? Object.keys(data).map(Number) : [state.selectedBab];
    const pool = buildWordPool(state.level, babKeys);
    const count = Math.min(state.questionCount, pool.length);
    const quiz = buildQuiz(pool, count, state.direction);
    setState({ screen:'quiz', quiz, currentIndex:0, answers:[], picked:null, answered:false });
  }
  else if(action==='pick-option'){
    if(state.answered) return;
    const opt = decodeURIComponent(el.dataset.opt);
    const q = state.quiz[state.currentIndex];
    const correct = opt === q.correctText;
    setState({ picked:opt, answered:true, answers:[...state.answers, {correct, picked:opt, q}] });
  }
  else if(action==='next-question'){
    if(state.currentIndex+1 < state.quiz.length){
      setState({ currentIndex: state.currentIndex+1, picked:null, answered:false });
    } else {
      setState({ screen:'result' });
    }
  }
  else if(action==='exit-quiz'){
    if(confirm('Keluar dari latihan? Progres saat ini akan hilang.')){
      setState({ screen:'setup', picked:null, answered:false });
    }
  }
  else if(action==='retry-same'){
    const data = state.level==='N5' ? N5_DATA : N4_DATA;
    const babKeys = state.babMode==='all' ? Object.keys(data).map(Number) : [state.selectedBab];
    const pool = buildWordPool(state.level, babKeys);
    const count = Math.min(state.questionCount, pool.length);
    const quiz = buildQuiz(pool, count, state.direction);
    setState({ screen:'quiz', quiz, currentIndex:0, answers:[], picked:null, answered:false });
  }
  else if(action==='back-setup'){
    setState({ screen:'setup', picked:null, answered:false });
  }
});

root.addEventListener('input', (e)=>{
  if(e.target.dataset.action==='slider-count'){
    setState({ questionCount: Number(e.target.value) });
  }
});

render();
</script>
</body>
</html>
